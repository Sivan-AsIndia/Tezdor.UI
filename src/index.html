<script>
 
 
window.initSidebar = function () {
 
  const menuLinks = document.querySelectorAll(".has-arrow");
 
  menuLinks.forEach(function (link) {
 
    link.replaceWith(link.cloneNode(true));
  });
 
  const newLinks = document.querySelectorAll(".has-arrow");
 
  newLinks.forEach(function (link) {
 
    link.addEventListener("click", function (e) {
      e.preventDefault();
 
      const parentLi = this.closest(".sidebar-item");
      const submenu = parentLi.querySelector("ul");
      const isActive = this.classList.contains("active");
 
      document.querySelectorAll(".sidebar-link").forEach(l => {
        l.classList.remove("active");
      });
 
      document.querySelectorAll(".first-level").forEach(ul => {
        ul.classList.remove("in");
      });
 
      if (isActive) return;
 
      this.classList.add("active");
      if (submenu) submenu.classList.add("in");
 
    });
 
  });
};
</script>
 

  <script>
    (function () {
      try {
        var raw = localStorage.getItem('app-theme');
        if (raw) {
          var theme = JSON.parse(raw);
          if (theme.isDarkMode) {
            document.documentElement.classList.add('dark-theme-init');
          }
          if (theme.layoutMode) {
            document.documentElement.setAttribute('data-layout', theme.layoutMode);
          }
          if (theme.primaryColor) {
            document.documentElement.style.setProperty('--primary', theme.primaryColor);
            document.documentElement.style.setProperty('--color-primary', theme.primaryColor);
          }
          if (theme.secondaryColor) {
            document.documentElement.style.setProperty('--secondary', theme.secondaryColor);
          }
              if (theme.headingColor) {
        document.documentElement.style.setProperty('--heading-color', theme.headingColor);
      }
        if (theme.iconColor) {
        document.documentElement.style.setProperty('--icon-color', theme.iconColor);
      }

       var html = document.documentElement;

      // ✅ Apply Dark Mode
      if (theme.isDarkMode) {
        html.classList.add('dark-theme');
        html.setAttribute('data-bs-theme', 'dark');
      } else {
        html.setAttribute('data-bs-theme', 'light');
      }
        }
      } catch (e) {
      }
    })();
  </script>
