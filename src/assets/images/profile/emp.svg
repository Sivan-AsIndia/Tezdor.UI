<svg width="260" height="200" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Shape -->
  <rect x="20" y="20" width="220" height="160" rx="16" fill="#F4F7FB"/>

  <!-- Building -->
  <rect x="70" y="80" width="50" height="80" rx="6" fill="#5D87FF"/>
  <rect x="130" y="60" width="50" height="100" rx="6" fill="#7EA1FF"/>

  <!-- Windows -->
  <g fill="#ffffff">
    <rect x="80" y="90" width="6" height="6" rx="1"/>
    <rect x="95" y="90" width="6" height="6" rx="1"/>
    <rect x="80" y="105" width="6" height="6" rx="1"/>
    <rect x="95" y="105" width="6" height="6" rx="1"/>

    <rect x="140" y="70" width="6" height="6" rx="1"/>
    <rect x="155" y="70" width="6" height="6" rx="1"/>
    <rect x="140" y="85" width="6" height="6" rx="1"/>
    <rect x="155" y="85" width="6" height="6" rx="1"/>
  </g>

  <!-- Door -->
  <rect x="95" y="135" width="10" height="25" rx="2" fill="#ffffff"/>

  <!-- Tree -->
  <circle cx="180" cy="130" r="18" fill="#E0E7FF"/>
  <rect x="177" y="140" width="6" height="20" rx="2" fill="#94A3B8"/>

  <!-- Person -->
  <circle cx="60" cy="120" r="10" fill="#5D87FF"/>
  <rect x="52" y="130" width="16" height="25" rx="6" fill="#5D87FF"/>

</svg>