<link rel="stylesheet" href="/assets/css/login/theme.css">
<link rel="stylesheet" href="/assets/css/login/inline_styles.css">
<link rel="stylesheet" href="/assets/css/login/tabler_icons.min.css">

<main>
    <div id="main-wrapper" class="flex">
        <div class="flex justify-center overflow-hidden h-full w-full min-h-screen">
            <div class="auth-login container container-xl relative flex items-center justify-center px-7 rounded-none">
                <div class="relative z-[1] container">
                    <div class="card auth-login-wrapper">
                        <div class="card-body p-0">
                            <div class="brand-logo d-flex align-items-center justify-start">
                                <a href="javascript:void(0)" class="text-nowrap logo-img">
                                    <div class="tezdor-logo">
                                        <div class="brand">
                                            <span class="tez">TEZ</span><span class="dor">DOR</span>
                                        </div>
                                        <div class="tagline">LIGHT OF JUSTICE</div>
                                    </div>
                                </a>
                            </div>

                            <div class="md:flex justify-around py-8 items-center">
                                <div class="lg:w-5/12 lg:flex hidden justify-center">
                                    <img src="/assets/images/login/login_security.png" alt="security"
                                        class="w-auto h-fit">
                                </div>
                                <div class="lg:w-5/12 w-full">
                                    <h2 class="font-bold text-3xl mb-3">Welcome to Tezdor</h2>
                                    <p class="text-base text-dark dark:text-darklink mb-7 font-medium">
                                        Your Admin Dashboard
                                    </p>

                                    <!-- API Error Message -->
                                    @if (apiError()) {
                                    <div class="alert alert-danger d-flex align-items-center mb-4"
                                        style="border-radius: 8px; padding: 12px 16px; background-color: #fef2f2; border: 1px solid #fecaca; color: #dc2626;">
                                        <i class="ti ti-alert-circle me-2" style="font-size: 18px;"></i>
                                        <span>{{ apiError() }}</span>
                                    </div>
                                    }

                                    <!-- API Success Message -->
                                    @if (apiSuccess()) {
                                    <div class="alert alert-success d-flex align-items-center mb-4"
                                        style="border-radius: 8px; padding: 12px 16px; background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a;">
                                        <i class="ti ti-check me-2" style="font-size: 18px;"></i>
                                        <span>{{ apiSuccess() }}</span>
                                    </div>
                                    }

                                    <form (ngSubmit)="login()">
                                        <div class="flex flex-col gap-5 mt-7">
                                            <!-- Email Field -->
                                            <div>
                                                <label
                                                    class="text-dark dark:text-darklink font-semibold mb-2 block">Username</label>
                                                <input type="email" class="form-control rounded-full"
                                                    [class.border-danger]="emailError()"
                                                    placeholder="Enter your email"
                                                    [ngModel]="email()"
                                                    (ngModelChange)="email.set($event)"
                                                    (input)="clearEmailError()"
                                                    name="email"
                                                    autocomplete="email">
                                                @if (emailError()) {
                                                <small class="text-danger mt-1 d-block">{{ emailError() }}</small>
                                                }
                                            </div>

                                            <!-- Password Field -->
                                            <div class="relative">
                                                <label
                                                    class="text-dark dark:text-darklink font-semibold mb-2 block">Password</label>
                                                <input [type]="showPassword() ? 'text' : 'password'"
                                                    class="form-control rounded-full w-full pr-10"
                                                    [class.border-danger]="passwordError()"
                                                    placeholder="Enter your password"
                                                    [ngModel]="password()"
                                                    (ngModelChange)="password.set($event)"
                                                    (input)="clearPasswordError()"
                                                    name="password"
                                                    autocomplete="current-password">
                                                <i class="bi absolute right-3 top-10 cursor-pointer"
                                                    style="right: 26px;"
                                                    [class.bi-eye]="!showPassword()"
                                                    [class.bi-eye-slash]="showPassword()"
                                                    (click)="showPassword.set(!showPassword())">
                                                </i>
                                                @if (passwordError()) {
                                                <small class="text-danger mt-1 d-block">{{ passwordError() }}</small>
                                                }
                                            </div>

                                            <!-- Remember Me & Change Password -->
                                            <div>
                                                <div class="flex justify-between my-2">
                                                    <div>
                                                        <label class="cursor-pointer label flex items-center">
                                                            <input type="checkbox"
                                                                class="border-bordergray w-4 h-4 rounded text-primary dark:border-darkborder bg-transparent dark:checked:bg-primary dark:checked:border-primary focus:ring-0 focus:ring-offset-0"
                                                                [ngModel]="rememberMe()"
                                                                (ngModelChange)="rememberMe.set($event)"
                                                                name="rememberMe">
                                                            <span class="label-text ms-2">Remember this Device</span>
                                                        </label>
                                                    </div>
                                                    <a routerLink="/change-password"
                                                        class="text-primary font-semibold"
                                                        style="cursor: pointer;">Change Password?</a>
                                                </div>
                                            </div>

                                            <!-- Sign In Button -->
                                            <button type="submit" class="btn btn-md py-3"
                                                [disabled]="loading()">
                                                @if (loading()) {
                                                <span class="spinner-border spinner-border-sm me-2"></span>
                                                Signing In...
                                                } @else {
                                                Sign In
                                                }
                                            </button>

                                            <!-- Sign Up Link -->
                                            <div>
                                                <span style="display: flex; justify-content: center;">
                                                    Don't have an account?
                                                    <a routerLink="/signup"
                                                        class="text-primary font-semibold"
                                                        style="cursor: pointer;">&nbsp;&nbsp;Sign up</a>
                                                </span>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <!-- Bottom Shape -->
                        <div class="absolute -bottom-24 -left-24 h-96 w-96 rounded-full bg-error -z-[1]"></div>
                        <!-- Top Shape -->
                        <img src="/assets/images/login/shap_login.png" alt="shape"
                            class="absolute h-80 w-80 -right-20 -z-[1] -top-24">
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
