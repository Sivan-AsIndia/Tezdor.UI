<style>
  /* ═══ BASE NAV ITEM ═══ */
  #sidebarnav > .sidebar-item > .sidebar-link {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    color: #1e293b;
    transition: all 0.2s;
    position: relative;
    white-space: nowrap;
    text-decoration: none;
  }

  /* ═══ DROPDOWN PANEL ═══ */
  #sidebarnav > .sidebar-item {
    position: relative;
  }

  #sidebarnav > .sidebar-item > .first-level {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 200px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 4px;
    z-index: 9999;
    animation: dropFade 0.15s ease;
  }

  @keyframes dropFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #sidebarnav > .sidebar-item > .first-level.show {
    display: block;
  }

  /* ═══ DROPDOWN ITEMS ═══ */
  .first-level .sidebar-item .sidebar-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: #475569;
    transition: all 0.15s;
    text-decoration: none;
  }

  /* ═══ DOT ═══ */
  .first-level .sidebar-link .sidebar-icon {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #cbd5e1;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  /* ════════════════════════════════
     PER-MENU COLORS
  ════════════════════════════════ */

  /* DASHBOARD */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-dashboard:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-dashboard.active-parent {
    background: color-mix(in srgb, var(--color-primary) 12%, transparent) !important;
    color: var(--color-primary) !important;
    font-weight: 600;
  }

  /* PRODUCTS */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-product:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-product.active-parent {
    background: #be00bf14 !important;
    color: #be00bf !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-product:hover,
  .first-level .sidebar-link.menu-product.active-submenu {
    background: #be00bf14 !important;
    color: #be00bf !important;
  }
  .first-level .sidebar-link.menu-product:hover .sidebar-icon,
  .first-level .sidebar-link.menu-product.active-submenu .sidebar-icon {
    background: #be00bf !important;
  }

  /* STORE */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-store:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-store.active-parent {
    background: var(--color-lightsuccess) !important;
    color: var(--color-success) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-store:hover,
  .first-level .sidebar-link.menu-store.active-submenu {
    background: var(--color-lightsuccess) !important;
    color: var(--color-success) !important;
  }
  .first-level .sidebar-link.menu-store:hover .sidebar-icon,
  .first-level .sidebar-link.menu-store.active-submenu .sidebar-icon {
    background: var(--color-success) !important;
  }

  /* PURCHASE */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-purchase:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-purchase.active-parent {
    background: var(--color-lightinfo) !important;
    color: var(--color-info) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-purchase:hover,
  .first-level .sidebar-link.menu-purchase.active-submenu {
    background: var(--color-lightinfo) !important;
    color: var(--color-info) !important;
  }
  .first-level .sidebar-link.menu-purchase:hover .sidebar-icon,
  .first-level .sidebar-link.menu-purchase.active-submenu .sidebar-icon {
    background: var(--color-info) !important;
  }

  /* SALES */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-sales:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-sales.active-parent {
    background: var(--color-lighterror) !important;
    color: var(--color-error) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-sales:hover,
  .first-level .sidebar-link.menu-sales.active-submenu {
    background: var(--color-lighterror) !important;
    color: var(--color-error) !important;
  }
  .first-level .sidebar-link.menu-sales:hover .sidebar-icon,
  .first-level .sidebar-link.menu-sales.active-submenu .sidebar-icon {
    background: var(--color-error) !important;
  }

  /* EMPLOYEES */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-employee:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-employee.active-parent {
    background: var(--color-lightwarning) !important;
    color: var(--color-warning) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-employee:hover,
  .first-level .sidebar-link.menu-employee.active-submenu {
    background: var(--color-lightwarning) !important;
    color: var(--color-warning) !important;
  }
  .first-level .sidebar-link.menu-employee:hover .sidebar-icon,
  .first-level .sidebar-link.menu-employee.active-submenu .sidebar-icon {
    background: var(--color-warning) !important;
  }

  /* LEDGER */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-ledger:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-ledger.active-parent {
    background: var(--color-lightindigo) !important;
    color: var(--color-indigo) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-ledger:hover,
  .first-level .sidebar-link.menu-ledger.active-submenu {
    background: var(--color-lightindigo) !important;
    color: var(--color-indigo) !important;
  }
  .first-level .sidebar-link.menu-ledger:hover .sidebar-icon,
  .first-level .sidebar-link.menu-ledger.active-submenu .sidebar-icon {
    background: var(--color-indigo) !important;
  }

  /* PETTY CASH */
  #sidebarnav > .sidebar-item > .sidebar-link.menu-petty:hover,
  #sidebarnav > .sidebar-item > .sidebar-link.menu-petty.active-parent {
    background: var(--color-lighterror) !important;
    color: var(--color-error) !important;
    font-weight: 600;
  }
  .first-level .sidebar-link.menu-petty:hover,
  .first-level .sidebar-link.menu-petty.active-submenu {
    background: var(--color-lighterror) !important;
    color: var(--color-error) !important;
  }
  .first-level .sidebar-link.menu-petty:hover .sidebar-icon,
  .first-level .sidebar-link.menu-petty.active-submenu .sidebar-icon {
    background: var(--color-error) !important;
  }

  /* ═══ DARK MODE ═══ */
  [data-bs-theme="dark"] #sidebarnav > .sidebar-item > .sidebar-link {
    color: #e2e8f0;
  }
  [data-bs-theme="dark"] #sidebarnav > .sidebar-item > .first-level {
    background: #1e293b;
    border-color: #334155;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  [data-bs-theme="dark"] .first-level .sidebar-item .sidebar-link {
    color: #94a3b8;
  }
  [data-bs-theme="dark"] .first-level .sidebar-link .sidebar-icon {
    background: #475569;
  }
</style>

<aside class="left-sidebar with-horizontal">
  <div>
    <nav id="sidebarnavh" class="sidebar-nav scroll-sidebar container-fluid">
      <ul id="sidebarnav" class="gap-2">

        <!-- DASHBOARD -->
        <li class="sidebar-item">
          <a routerLink="/dashboard"
            routerLinkActive="active-parent"
            [routerLinkActiveOptions]="{ exact: true }"
            class="sidebar-link menu-dashboard">
            <iconify-icon icon="solar:screencast-2-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Dashboard</span>
          </a>
        </li>

        <!-- PRODUCTS (direct link, no dropdown) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-product"
            routerLink="/products"
            routerLinkActive="active-parent"
            [routerLinkActiveOptions]="{ exact: false }"
            [class.active-parent]="isParentActive('productMenu')"
            (click)="toggle('productMenu')">
            <iconify-icon icon="solar:box-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Products</span>
          </a>
        </li>

        <!-- STORE (direct link) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-store"
            routerLink="/store"
            routerLinkActive="active-parent"
            [routerLinkActiveOptions]="{ exact: false }">
            <iconify-icon icon="mdi:warehouse" class="fs-6"></iconify-icon>
            <span class="hide-menu">Store</span>
          </a>
        </li>

        <!-- PURCHASE (dropdown: Order + Invoice) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-purchase has-arrow"
            href="javascript:void(0)"
            [class.active-parent]="isParentActive('purchaseMenu')"
            (click)="toggle('purchaseMenu')">
            <iconify-icon icon="solar:cart-3-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Purchase</span>
          </a>
          <ul class="collapse first-level" [class.show]="isOpen('purchaseMenu')">
            <li class="sidebar-item">
              <a routerLink="/purchase-order"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-purchase"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Purchase Order</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a routerLink="/purchase-invoice"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-purchase"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Purchase Invoice</span>
              </a>
            </li>
          </ul>
        </li>

        <!-- SALES (direct link) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-sales"
            routerLink="/sales-invoice"
            routerLinkActive="active-parent"
            [routerLinkActiveOptions]="{ exact: false }">
            <iconify-icon icon="solar:wallet-money-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Sales Invoice</span>
          </a>
        </li>

        <!-- EMPLOYEES (dropdown) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-employee has-arrow"
            href="javascript:void(0)"
            [class.active-parent]="isParentActive('viewEmployees')"
            (click)="toggle('viewEmployees')">
            <iconify-icon icon="solar:users-group-rounded-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Employees</span>
          </a>
          <ul class="collapse first-level" [class.show]="isOpen('viewEmployees')">
            <li class="sidebar-item">
              <a routerLink="/employees"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-employee"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Employee List</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a routerLink="/employees/create"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-employee"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Create Employee</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a routerLink="/attendance"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-employee"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Attendance</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a routerLink="/salary"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-employee"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Salary</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a routerLink="/petty-cash"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-employee"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Petty Cash</span>
              </a>
            </li>
          </ul>
        </li>

        <!-- LEDGER (dropdown) -->
        <li class="sidebar-item">
          <a class="sidebar-link menu-ledger has-arrow"
            href="javascript:void(0)"
            [class.active-parent]="isParentActive('ledgerMenu')"
            (click)="toggle('ledgerMenu')">
            <iconify-icon icon="solar:notebook-line-duotone" class="fs-6"></iconify-icon>
            <span class="hide-menu">Ledger</span>
          </a>
          <ul class="collapse first-level" [class.show]="isOpen('ledgerMenu')">
            <li class="sidebar-item">
              <a routerLink="/general-ledger-entries"
                routerLinkActive="active-submenu"
                [routerLinkActiveOptions]="{ exact: true }"
                class="sidebar-link menu-ledger"
                (click)="openMenu.set(null)">
                <span class="sidebar-icon"></span>
                <span class="hide-menu">Ledger Entry</span>
              </a>
            </li>
          </ul>
        </li>

      </ul>
    </nav>
  </div>
</aside>
