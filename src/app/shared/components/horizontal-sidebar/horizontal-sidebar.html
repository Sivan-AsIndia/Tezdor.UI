<style>
  .first-level .sidebar-link .hide-menu {
    font-weight: 600;
    font-size: 13.5px;
    color: black;
  }

  .menu-warning .first-level .sidebar-link.active-submenu .sidebar-icon {
    background-color: #ffc107;
  }

  .menu-success .first-level .sidebar-link.active-submenu .sidebar-icon {
    background-color: #13a65b;
  }

   .menu-error .first-level .sidebar-link.active-submenu .sidebar-icon {
    background-color: red !important;
  }


  .menu-info .first-level .sidebar-link.active-submenu .sidebar-icon {
    background-color: #01b8d8;
  }

  .menu-warning .first-level .sidebar-link.active-submenu .hide-menu {
    font-weight: 700;
    color: #e6a817;
  }

  .menu-success .first-level .sidebar-link.active-submenu .hide-menu {
    font-weight: 700;
    color: #13a65b;
  }

  .menu-info .first-level .sidebar-link.active-submenu .hide-menu {
    font-weight: 700;
    color: #01b8d8;
  }

  @media (prefers-color-scheme: dark) {
    .sidebar-link.before\:bg-lightprimary:hover,
    .sidebar-link.bg-lightprimary:hover {
      background-color: rgba(93, 135, 255, 0.15) !important;
    }

    .sidebar-link.before\:bg-lightsuccess:hover,
    .sidebar-link.bg-lightsuccess:hover {
      background-color: rgba(19, 166, 91, 0.15) !important;
    }

    .sidebar-link.before\:bg-lightinfo:hover,
    .sidebar-link.bg-lightinfo:hover {
      background-color: rgba(1, 184, 216, 0.15) !important;
    }

    .sidebar-link.before\:bg-lighterror:hover,
    .sidebar-link.bg-lighterror:hover {
      background-color: rgba(250, 82, 82, 0.15) !important;
    }

    .sidebar-link.before\:bg-lightwarning:hover,
    .sidebar-link.bg-lightwarning:hover {
      background-color: rgba(255, 165, 0, 0.15) !important;
    }

    .first-level .sidebar-link .hide-menu {
      color: #a0aec0;
    }

    .first-level .sidebar-link .sidebar-icon {
      background-color: #4a5568;
    }

    .first-level {
      color: #ffc107;
    }

    .menu-success .first-level .sidebar-link.active-submenu .hide-menu {
      color: #13a65b;
    }

    .menu-info .first-level .sidebar-link.active-submenu .hide-menu {
      color: #01b8d8;
    }
  }

  .active-bg-error { background-color: rgba(220, 53, 69, 0.15) !important; border-radius: 7px; }

</style>

<aside class="left-sidebar with-horizontal">
